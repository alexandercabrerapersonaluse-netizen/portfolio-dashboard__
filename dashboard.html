<!DOCTYPE html>
<html>

    <head>
        <title>Dashboard - Page</title>
        <link rel="stylesheet" href="style-2.css">
        <script defer src="script.js"></script>
    </head>
        
    <body>
        
        <nav>

            <div class="title-container">
                <h2 class="brand-title">My Portfolio</h2>
            </div>

            <div class="links-container">
                <a class="link" href="index.html">Home</a>
                <a class="link" href="dashboard.html">Dashboard</a>
                <a class="link" href="upload.html">Upload</a>
            </div>

        </nav>

        <div class="dashboard-container">

            <h1>My Dashboard</h1>

            <div class="stats">
                <div>Total: <span id="total">0</span></div>
                <div>Quiz: <span id="quiz">0</span></div>
                <div>Lab: <span id="lab">0</span></div>
                <div>Exam: <span id="exam">0</span></div>
            </div>

            <div class="filters">
                <button onclick="filterUploads('quiz')">Quiz</button>
                <button onclick="filterUploads('lab')">Lab</button>
                <button onclick="filterUploads('exam')">Exam</button>
            </div>

            <div id="uploads" class="grid"></div>
            
        </div>

    </body>

</html>
